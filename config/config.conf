server {
	interface_port 0.0.0.0:8080;
	interface_port 0.0.0.0:8081;
	interface_port 0.0.0.0:8082;
	error_page 400 src/www/errors/400.html;
	error_page 401 src/www/errors/401.html;
	error_page 403 src/www/errors/403.html;
	error_page 404 src/www/errors/404.html;
	error_page 405 src/www/errors/405.html;
	error_page 408 src/www/errors/408.html;
	error_page 409 src/www/errors/409.html;
	error_page 413 src/www/errors/413.html;
	error_page 414 src/www/errors/414.html;
	error_page 415 src/www/errors/415.html;
	error_page 422 src/www/errors/422.html;
	error_page 429 src/www/errors/429.html;
	error_page 500 src/www/errors/500.html;
	error_page 501 src/www/errors/501.html;
	error_page 502 src/www/errors/502.html;
	error_page 503 src/www/errors/503.html;
	error_page 504 src/www/errors/504.html;
	error_page 505 src/www/errors/505.html;
	error_page 508 src/www/errors/508.html;
	default_type	file_type;
	#max_body_size 2147483647; # INT_MAX
	max_body_size 2M; # INT_MAX
	include 	content-type/mime.types;
	location / {
		allow_methods GET POST;
		root src/www;
		directory_listing on;             
		default_file main/index.html;       
			
	}
	location /post {
		allow_methods GET POST;
		root src/www/post;
		directory_listing on;             
		default_file index.html;        
	}
	location /get {
		allow_methods GET;
		root src/www/get;
		directory_listing on;          
		#default_file index.html;        
	}
	location /delete {
		allow_methods GET DELETE;
		root src/www/uploads;
		directory_listing on;                     
	}
	location /cgi-bin {
		allow_methods GET POST DELETE;
		root src/www/cgi-bin;
		directory_listing on;
		allow_methods GET POST;
        cgi .py /usr/bin/python3;
		default_file index.html;
	}

	location /cgi-bin/py {
		allow_methods GET POST DELETE;
		root src/www/cgi-bin/py;
		directory_listing on;
		allow_methods GET POST;
        cgi .py /usr/bin/python3;
		default_file index.html;
	}

	location /cgi-bin/php {
		allow_methods GET POST DELETE;
		root src/www/cgi-bin/php;
		directory_listing on;
		allow_methods GET POST;
        cgi .php /usr/bin/php;
	}

	location /cgi-bin/sh {
		allow_methods GET POST DELETE;
		root src/www/cgi-bin/sh;
		directory_listing on;
		allow_methods GET POST;
		cgi .sh  /bin/bash;
	}

	location /session {
		allow_methods GET POST DELETE;
		root src/www/session;
		directory_listing on;
		cgi .py /usr/bin/python3;
		default_file index.html;
	}
	
	location /kapouet {
		allow_methods GET POST;
		redirect https://www.youtube.com/;
		root src/www/cgi-bin;
	}
}



