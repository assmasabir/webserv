<!DOCTYPE html>
<html>
    <header>
        <style>
            body {
                display: flex;
                flex-direction: column;
                background-color: black;
                color: whitesmoke;
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                text-align: center;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .cont {
                background-color: rgb(255, 255, 255, 0.05);
                /* width: 100%; */
                padding: 90px;
                max-width: 300px;
                border-radius: 12px;
            }
            input[type=submit], input[type=file]{
                padding: 17px 15px;
                border-radius: 5px;
                border: none;
                margin-bottom: 15px;
                color: white;
                width: 100%;
                margin-top: 9px;
                
            }
            input[type=submit]{
                background-color:  rgb(146, 3, 3);
                font-weight: bold;
                font-size: 14px;
                cursor: pointer;
                margin-left: 15px;
                
            }
            input[type="file"]::placeholder{
                color: #aaa;
            }
            input[type="file"]{
                background-color: #222;
            }
            input[type=submit]:hover{
                background-color: rgb(150, 40, 35);
            }
        </style>
    </header>
    <body>
        <form action="" method="post" enctype="multipart/form-data">
            <div class="cont">

                <input type="file" name="file-upload" id="fupload" placeholder="upload a file here" required> 
                <input type="submit" value="submit">
            </div>
        </form>
    </body>
</html>
