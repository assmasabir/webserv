<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="favicon" href="../images/favicon.png" type="image/png">
    <title>Session Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: black;
            color: whitesmoke;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-align: center;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 70px;
            margin-bottom: 2rem;
        }
        h3 {
            font-size: 25px;
            color: whitesmoke;
            margin-bottom: 1.5rem;
        }
        .back-button {
            position: fixed;
            top: 2rem;
            left: 2rem;
            background-color: rgb(146, 3, 3);
            color: cornsilk;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 20px;
            text-decoration: none;
            font-size: 18px;
            cursor: pointer;
        }
        .back-button:hover {
            background-color: rgb(150, 40, 35);
        }
        .container {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            border-radius: 30px;
        }
        .login-form {
            margin-bottom: 2rem;
        }
        .error-message {
            background-color: rgba(146, 3, 3, 0.3);
            border: 1px solid rgb(146, 3, 3);
            color: cornsilk;
            padding: 1rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            display: none;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            color: whitesmoke;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 18px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            color: whitesmoke;
            font-size: 16px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: rgb(146, 3, 3);
            background-color: rgba(255, 255, 255, 0.08);
        }
        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .login-button {
            width: 100%;
            background-color: rgb(146, 3, 3);
            color: cornsilk;
            border: none;
            padding: 1rem 2rem;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        .login-button:hover {
            background-color: rgb(150, 40, 35);
        }
        .features {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .feature {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 15px;
            font-size: 16px;
            min-width: 180px;
        }
        .security-note {
            margin-top: 2rem;
            padding: 1rem;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 50px;
            }
            .container {
                padding: 30px;
            }
            .back-button {
                top: 1rem;
                left: 1rem;
                padding: 0.6rem 1rem;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <a href="/main/index.html" class="back-button">← Main</a>
    
    <h1>Session Login</h1>
    
    <div class="container">
        <h3>Secure Cookie-Based Authentication</h3>

        <form class="login-form" action="/session/log.py" method="post">
            <div id="errorMessage" class="error-message">
                Invalid credentials. Please check your username and password.
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-button">
                Login to Session
            </button>
        </form>

        <div class="features">
            <div class="feature">
                🔐 Secure Sessions
            </div>
            <div class="feature">
                👤 Multi-User Support
            </div>
        </div>

        <div class="security-note">
            <strong>Note:</strong> This system creates individual sessions for each username. Sessions are stored as secure cookies and can be managed independently.
        </div>
    </div>
</body>
</html>
