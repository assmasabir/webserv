<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="favicon" href="../images/favicon.png" type="image/png">
    <title>CGI Scripts - Webserv</title>
    <style>
        body {
            background-color: black;
            color: whitesmoke;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-align: center;
            margin-top: 9%;
        }
        h1 {
            font-size: 70px;
        }
        h3 {
            font-size: 25px;
            color: whitesmoke;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .b1, .b2, .b3 {
            background-color: rgb(146, 3, 3);
            width: 200px;
            height: 53px;
            border: none;
            color: cornsilk;
            border-radius: 20px;
            text-align: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
        }
        .b3:hover, .b2:hover, .b1:hover {
            background-color: rgb(150, 40, 35);
        }
        .select {
            background-color: rgb(255, 255, 255, 0.05);
            padding: 50px;
            width: 870px;
            border-radius: 30px;
            margin: 0 auto;
        }
        .back-btn {
            background-color: rgb(146, 3, 3);
            width: 150px;
            height: 45px;
            border: none;
            color: cornsilk;
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 30px;
        }
        .back-btn:hover {
            background-color: rgb(150, 40, 35);
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>CGI Scripts</h1>
    <div class="select">
        <h3>Available  Scripts</h3>
        <div class="grid">
            <a href="/cgi-bin/py/hello.py">
                <button type="button" class="b1">hello.py</button>
            </a>
            <a href="/cgi-bin/sh/hello.sh">
                <button type="button" class="b2">hello.sh</button>
            </a>
            <a href="/cgi-bin/php/hello.php">
                <button type="button" class="b3">hello.php</button>
            </a>
        </div>
        <a href="/main/index.html">
            <button type="button" class="back-btn"> Back to Home </button>
        </a>
    </div>
</body>
</html>
