<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="favicon" href="../images/favicon.png" type="image/png">
        <title>Webserv</title>
        <style>
            body {
                background-color: black;
                color: whitesmoke;
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                text-align: center;
                margin-top: 9%;
            }
            h1 {
                font-size: 70px;
            }
            h3 {
                font-size: 25px;
                color: whitesmoke;

            }
            .grid {
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
                justify-self: center;
            }
            .b1, .b2, .b3{
                background-color: rgb(146, 3, 3);
                width: 200px;
                height: 53px;
                border: none;
                color: cornsilk;
                border-radius: 20px;
                text-align: center;
                align-items: center;
                font-size: 20px;
                cursor: pointer;
            }
            .b3:hover, .b2:hover, .b1:hover{
                background-color: rgb(150, 40, 35);
            }
            .select{
                background-color: rgb(255, 255, 255, 0.05);
                padding: 50px;
                width: 870px;
                border-radius: 30px;
                justify-self: center;
            }
        </style>
</head>
<body>
    <h1>Welcome to Webserv !</h1>
    <div class="select">
        <h3>Mandatory part</h3>
        <div class="grid">
            <a href="/get">
                <button type="button" class="b1"> Get request</button>
            </a>
            <a href="/post">
                <button type="button" class="b2"> Post request</button>
            </a>
            <a href="/delete">
                <button type="button" class="b3"> Delete request</button>
            </a>
            <a href="/cgi-bin/py/index.html">
                <button type="button" class="b3"> CGI </button>
            </a>
        </div>
        <h3>Bonus part</h3>
        <div class="grid">
                <a href="/session">
                    <button type="button" class="b3">Cookies</button>
                </a>
                <a href="/cgi-bin/index.html">
                    <button type="button" class="b3">More CGI scriptes</button>
                </a>
        </div>
    </div>

</body>
</html>
